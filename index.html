<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Radio Comunitaria El Brote 90.3 FM - Comunicación Popular desde Villa Ciudad Parque">
    <meta name="keywords"
        content="radio comunitaria, el brote, 90.3 FM, Villa Ciudad Parque, comunicación popular, radio online">
    <meta name="author" content="Radio Comunitaria El Brote">
    <meta name="theme-color" content="#d32f2f">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://elbrote.org/">
    <meta property="og:title" content="Radio Comunitaria El Brote - 90.3 FM">
    <meta property="og:description"
        content="Escuchá Radio El Brote en vivo. Comunicación Popular desde Villa Ciudad Parque">
    <meta property="og:image" content="https://elbrote.org/wp-content/uploads/2025/08/radio-comunitaria-elbrote-3.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://elbrote.org/">
    <meta property="twitter:title" content="Radio Comunitaria El Brote - 90.3 FM">
    <meta property="twitter:description" content="Escuchá Radio El Brote en vivo.">

    <title>Radio El Brote 90.3 FM | En Vivo</title>

    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        :root {
            --primary-color: #d32f2f;
            --dark-bg: #263238;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
        }

        /* Sidebar Styles */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--dark-bg);
            color: #fff;
            transition: all 0.3s;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            background: rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-logo {
            max-width: 180px;
            height: auto;
            /* Filtro para que el logo negro se vea blanco en el fondo oscuro */
            filter: brightness(0) invert(1);
            margin-bottom: 10px;
        }

        #sidebar ul.components {
            padding: 20px 0;
        }

        #sidebar ul li a {
            padding: 15px 25px;
            font-size: 1.1em;
            display: block;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: 0.3s;
        }

        #sidebar ul li a:hover {
            color: #fff;
            background: var(--primary-color);
        }

        #sidebar ul li.active > a {
            color: #fff;
            background: var(--primary-color);
        }

        /* Content Area */
        #content {
            width: calc(100% - var(--sidebar-width));
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s;
        }

        @media (max-width: 768px) {
            #sidebar { margin-left: calc(-1 * var(--sidebar-width)); }
            #sidebar.active { margin-left: 0; }
            #content { width: 100%; margin-left: 0; }
        }
    </style>
</head>

<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <img src="logo-semilla.png" alt="Logo Semilla del Sur" class="sidebar-logo">
            <p style="font-size: 0.8em; opacity: 0.6; margin-top: 5px;">90.3 FM</p>
        </div>

        <ul class="list-unstyled components">
            <li class="active">
                <a href="#"><i class="fas fa-radio mr-3"></i> En Vivo</a>
            </li>
            <li>
                <a href="#"><i class="fas fa-calendar-alt mr-3"></i> Programación</a>
            </li>
            <li>
                <a href="#"><i class="fas fa-microphone-alt mr-3"></i> Podcasts</a>
            </li>
            <li>
                <a href="#"><i class="fas fa-newspaper mr-3"></i> Noticias</a>
            </li>
            <li>
                <a href="https://wa.me/tu-numero" target="_blank">
                    <i class="fab fa-whatsapp mr-3"></i> Contacto
                </a>
            </li>
        </ul>
    </nav>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-light d-md-none">
            <button type="button" id="sidebarCollapse" class="btn btn-danger">
                <i class="fas fa-align-left"></i>
            </button>
        </nav>

        <div class="container-fluid">
            <h1>Bienvenido a Radio El Brote</h1>
            <p>Comunicación Popular desde Villa Ciudad Parque.</p>
            
            <div class="player-container p-5 text-center bg-white shadow-sm rounded">
                <i class="fas fa-play-circle fa-5x text-danger mb-3" style="cursor: pointer;"></i>
                <h4>Escuchando en vivo...</h4>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        $(document).ready(function () {
            // Toggle Sidebar en móviles
            $('#sidebarCollapse').on('click', function () {
                $('#sidebar').toggleClass('active');
            });

            console.log('🎵 Radio El Brote initialized successfully!');
        });

        /* Nota: El logo debe llamarse 'logo-semilla.png' 
           y estar en la misma carpeta que este archivo.
        */
    </script>

</body>
</html>
